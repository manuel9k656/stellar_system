<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stellar Systems — Ingeniería de precisión digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #05080F;
  --bg-2: #0A1020;
  --panel: #0B1220;
  --panel-2: #111A2E;
  --line: rgba(140, 170, 220, 0.10);
  --line-strong: rgba(140, 170, 220, 0.22);
  --text: #F2F4F8;
  --text-dim: #A8B3C7;
  --text-mute: #8895AD;
  --blue: #3D6EFF;
  --blue-2: #5B82FF;
  --cyan: #7CE3FF;
  --cyan-soft: rgba(124, 227, 255, 0.14);
  --grid: 1280px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'ss01', 'ss02';
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background:
    radial-gradient(900px 600px at 80% -10%, rgba(61,110,255,0.18), transparent 60%),
    radial-gradient(700px 500px at 10% 30%, rgba(124,227,255,0.07), transparent 60%),
    radial-gradient(800px 600px at 50% 110%, rgba(61,110,255,0.10), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#starfield {
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
}

#root { position: relative; z-index: 1; }

.mono {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.eyebrow {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--cyan);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--cyan);
}

.container {
  width: min(var(--grid), 100% - 48px);
  margin: 0 auto;
}

/* ---------- Nav ---------- */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 18px 0;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  background: linear-gradient(180deg, rgba(5,8,15,0.85), rgba(5,8,15,0.55));
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--text);
}
.brand-mark {
  width: 32px; height: 32px;
  position: relative;
  flex: none;
}
.brand-name {
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--text-mute);
  text-transform: uppercase;
  margin-top: 2px;
}
.nav-links {
  display: flex;
  gap: 32px;
  align-items: center;
}
.nav-link {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.nav-link:hover { color: var(--text); }
.nav-link .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-mute);
}
.nav-cta-wrap { display: flex; align-items: center; gap: 16px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-radius: 999px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0;
  text-decoration: none;
  cursor: pointer;
  border: 1px solid transparent;
  transition: transform 0.15s ease, background 0.2s, border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 12px 32px -10px rgba(61,110,255,0.55);
}
.btn-primary:hover { background: var(--blue-2); transform: translateY(-1px); }
.btn-ghost {
  background: rgba(255,255,255,0.02);
  color: var(--text);
  border-color: var(--line-strong);
}
.btn-ghost:hover { background: rgba(255,255,255,0.05); border-color: rgba(180,200,240,0.4); }
.btn-arrow {
  width: 14px; height: 14px;
  transition: transform 0.2s;
}
.btn:hover .btn-arrow { transform: translate(2px, -2px); }

/* ---------- Mobile menu ---------- */
.hamburger {
  display: none;
  background: transparent;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 6px;
  align-items: center;
  justify-content: center;
}
.mobile-menu {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(5,8,15,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  padding: 96px 32px 48px;
  gap: 4px;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.mobile-menu.open { transform: translateX(0); }
.mobile-menu-link {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text-dim);
  text-decoration: none;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
  transition: color 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mobile-menu-link:hover { color: var(--text); }
.mobile-close {
  position: absolute;
  top: 18px;
  right: 18px;
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  cursor: pointer;
}

/* ---------- Hero ---------- */
.hero {
  position: relative;
  padding: 96px 0 120px;
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 64px;
  align-items: center;
}
.hero-title {
  font-size: clamp(32px, 7vw, 96px);
  line-height: 0.96;
  letter-spacing: -0.035em;
  font-weight: 500;
  margin: 24px 0 28px;
}
.hero-title em {
  font-style: normal;
  background: linear-gradient(180deg, #FFFFFF 0%, #BFD2FF 60%, #7CE3FF 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-sub {
  font-size: 18px;
  line-height: 1.55;
  color: var(--text-dim);
  max-width: 520px;
  margin: 0 0 36px;
}
.hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }

.hero-meta {
  margin-top: 64px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.hero-meta-item .v {
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.hero-meta-item .v small {
  font-size: 16px;
  color: var(--text-mute);
  margin-left: 4px;
}
.hero-meta-item .l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ---------- Hero visual: orbit system ---------- */
.orbit {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  max-width: 560px;
  margin-left: auto;
}
.orbit svg {
  width: 100%; height: 100%;
  overflow: visible;
}
.orbit-core {
  position: absolute;
  left: 50%; top: 50%;
  width: 96px; height: 96px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 35%, #FFFFFF 0%, #7CE3FF 30%, #3D6EFF 65%, #0F1B3D 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    0 0 60px rgba(61,110,255,0.55),
    0 0 140px rgba(61,110,255,0.35);
}
.orbit-core::after {
  content: "";
  position: absolute; inset: -18px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,227,255,0.18), transparent 70%);
}
.orbit-label {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-mute);
  white-space: nowrap;
}
.orbit-label .dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  box-shadow: 0 0 10px var(--cyan);
}

@keyframes spin { to { transform: rotate(360deg); } }
.orbit-rot { transform-origin: 50% 50%; animation: spin var(--dur, 60s) linear infinite; }
.orbit-rot.rev { animation-direction: reverse; }

/* ---------- Section frame ---------- */
.section {
  position: relative;
  padding: 120px 0;
}
.section-alt {
  background: #0A1020;
}
.section-head {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 48px;
  align-items: end;
  margin-bottom: 64px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.section-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-mute);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.section-title {
  font-size: clamp(36px, 4.5vw, 60px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  font-weight: 500;
  margin: 0;
  max-width: 900px;
}
.section-title .dim { color: var(--text-mute); }

/* ---------- About ---------- */
.about-grid {
  display: grid;
  grid-template-columns: 200px 1fr 1fr;
  gap: 48px;
}
.about-lead {
  font-size: 22px;
  line-height: 1.45;
  color: var(--text);
  letter-spacing: -0.005em;
  max-width: 520px;
}
.about-body {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-dim);
  max-width: 480px;
}
.about-body p + p { margin-top: 14px; }
.principles {
  margin-top: 64px;
  display: grid;
  grid-template-columns: 200px 1fr 1fr 1fr;
  gap: 48px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
}
.principle h4 {
  font-size: 14px;
  font-weight: 500;
  margin: 0 0 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.principle h4 .pn {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-mute);
  font-size: 11px;
}
.principle p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-dim);
  margin: 0;
}

/* ---------- Services ---------- */
.services {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.service {
  grid-column: span 2;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 32px 28px 36px;
  background: rgba(11, 18, 32, 0.4);
  position: relative;
  transition: background 0.25s;
  min-height: 260px;
  display: flex;
  flex-direction: column;
}
.service.wide { grid-column: span 3; }
.service:hover { background: rgba(17, 26, 46, 0.7); }
.service .sicon {
  width: 36px; height: 36px;
  margin-bottom: 28px;
  color: var(--cyan);
}
.service .sn {
  position: absolute;
  top: 20px; right: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
}
.service h3 {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 10px;
}
.service p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-dim);
  margin: 0 0 18px;
  flex: 1;
}
.service-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-mute);
  padding: 4px 10px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  text-transform: uppercase;
}

/* ---------- Products ---------- */
.products {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 56px;
}
.product-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.product-tab {
  text-align: left;
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 18px 16px;
  cursor: pointer;
  border-left: 2px solid transparent;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: color 0.15s, border-color 0.2s, background 0.2s;
  font-family: 'Space Grotesk', sans-serif;
}
.product-tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.product-tab.active {
  color: var(--text);
  border-left-color: var(--cyan);
  background: linear-gradient(90deg, rgba(124,227,255,0.06), transparent);
}
.product-tab .pt-name {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.product-tab .pt-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-mute);
  text-transform: uppercase;
}

.product-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(17,26,46,0.6), rgba(11,18,32,0.55));
  overflow: hidden;
  position: relative;
}
.product-head {
  padding: 28px 32px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 32px;
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 1;
}
.product-head h3 {
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 6px 0 8px;
}
.product-head .pcat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--cyan);
  text-transform: uppercase;
}
.product-head .pdesc {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-dim);
  margin: 0;
  max-width: 460px;
}
.product-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,0.02);
}
.product-status .live {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #6BE9A6;
  box-shadow: 0 0 10px #6BE9A6;
}
.product-body {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  position: relative;
  z-index: 1;
}
.product-features {
  padding: 32px;
  border-right: 1px solid var(--line);
}
.product-features h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-mute);
  text-transform: uppercase;
  margin: 0 0 18px;
  font-weight: 500;
}
.feat-list { list-style: none; padding: 0; margin: 0; }
.feat-list li {
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: 12px;
  padding: 10px 0;
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.5;
  border-bottom: 1px dashed var(--line);
}
.feat-list li:last-child { border-bottom: none; }
.feat-list .chk {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  margin-top: 2px;
}
.product-stats {
  padding: 32px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 24px;
  align-content: start;
}
.pstat {
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.pstat .l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 6px;
}
.pstat .v {
  font-size: 22px;
  letter-spacing: -0.01em;
  font-weight: 500;
}
.pstat .v small {
  font-size: 13px;
  color: var(--text-mute);
  margin-left: 4px;
  font-weight: 400;
}

/* Case-study layout */
.product-head h3 .pclient {
  font-weight: 400;
  color: var(--text-dim);
  font-size: 22px;
  letter-spacing: -0.01em;
}
.case-body {
  display: grid;
  grid-template-columns: 1fr 1.1fr 1fr;
  position: relative;
  z-index: 1;
}
.case-col {
  padding: 28px 28px 32px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.case-col:last-child { border-right: none; }
.case-col h5 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin: 0;
  font-weight: 500;
}
.case-col p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-dim);
  margin: 0;
}
.case-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
}
.case-list li {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 10px;
  padding: 9px 0;
  font-size: 13.5px;
  color: var(--text-dim);
  line-height: 1.5;
  border-bottom: 1px dashed var(--line);
}
.case-list li:last-child { border-bottom: none; }
.case-list .chk {
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  margin-top: 2px;
}
.case-list .chk.imp {
  font-size: 14px;
  font-weight: 600;
}
.case-stack {
  margin-top: auto;
  padding-top: 18px;
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.case-stack .stack-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--text-mute);
  text-transform: uppercase;
}
.case-stack .stack-tags { display: flex; flex-wrap: wrap; gap: 6px; }

.product-vis {
  position: absolute;
  right: 16px;
  top: 18px;
  width: 130px; height: 130px;
  opacity: 0.9;
  pointer-events: none;
}

/* ---------- Contact ---------- */
.contact {
  position: relative;
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 72px 64px;
  background:
    radial-gradient(600px 300px at 80% 0%, rgba(61,110,255,0.18), transparent 60%),
    radial-gradient(500px 300px at 10% 100%, rgba(124,227,255,0.10), transparent 60%),
    linear-gradient(180deg, rgba(17,26,46,0.6), rgba(11,18,32,0.6));
  overflow: hidden;
}
.contact::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, var(--line) 1px, transparent 1px),
    linear-gradient(to bottom, var(--line) 1px, transparent 1px);
  background-size: 64px 64px;
  background-position: -1px -1px;
  mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 70%);
  opacity: 0.4;
  pointer-events: none;
}
.contact-inner {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  align-items: center;
}
.contact h2 {
  font-size: clamp(40px, 5vw, 64px);
  line-height: 1;
  letter-spacing: -0.03em;
  font-weight: 500;
  margin: 16px 0 20px;
}
.contact p {
  font-size: 17px;
  line-height: 1.55;
  color: var(--text-dim);
  margin: 0 0 32px;
  max-width: 460px;
}
.contact-form {
  border: 1px solid var(--line-strong);
  border-radius: 16px;
  background: rgba(5,8,15,0.55);
  padding: 28px;
  backdrop-filter: blur(8px);
}
.contact-form .row {

<script>
// Subtle starfield — drawn once per resize, gentle parallax drift on scroll.
(function () {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let scrollY = 0;

  function seed() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const count = Math.floor((w * h) / 5200);
    stars = [];
    for (let i = 0; i < count; i++) {
      const layer = Math.random() < 0.7 ? 0 : (Math.random() < 0.7 ? 1 : 2);
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h * 2.4,
        r: layer === 2 ? Math.random() * 1.3 + 0.7 : layer === 1 ? Math.random() * 0.9 + 0.4 : Math.random() * 0.6 + 0.2,
        a: layer === 2 ? 0.85 : layer === 1 ? 0.55 : 0.3,
        layer,
        tw: Math.random() * Math.PI * 2,
      });
    }
  }

  function draw(t) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      const parY = s.y - scrollY * (s.layer === 2 ? 0.25 : s.layer === 1 ? 0.12 : 0.05);
      const y = ((parY % (window.innerHeight * 2.4)) + window.innerHeight * 2.4) % (window.innerHeight * 2.4);
      if (y > window.innerHeight + 4) continue;
      const flicker = s.layer === 2 ? 0.7 + Math.sin(t * 0.0009 + s.tw) * 0.3 : 1;
      ctx.globalAlpha = s.a * flicker;
      ctx.fillStyle = s.layer === 2 ? '#cfe3ff' : '#9fb4d8';
      ctx.beginPath();
      ctx.arc(s.x * dpr, y * dpr, s.r * dpr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', seed);
  window.addEventListener('scroll', () => { scrollY = window.scrollY; }, { passive: true });
  seed();
  requestAnimationFrame(draw);
})();
</script>

const Contact = () => {
